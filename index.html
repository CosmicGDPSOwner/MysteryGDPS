<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery GDPS | Global List</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #030305;
            --main-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 25%, #ff007f 100%);
            --card-bg: rgba(16, 16, 26, 0.9);
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid; border-image: var(--main-grad) 1;
        }
        .logo { font-family: 'Montserrat'; font-size: 2rem; font-weight: 900; background: var(--main-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .hero { text-align: center; padding: 60px 20px; }
        .hero h1 { font-family: 'Montserrat'; font-size: 4rem; background: var(--main-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        .mode-tabs { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .tab-btn { 
            padding: 25px 60px; background: #111; border: 2px solid #333; color: white; 
            border-radius: 20px; font-weight: 900; font-size: 1.3rem; cursor: pointer; transition: 0.4s;
            text-transform: uppercase;
        }
        .tab-btn.active { background: var(--main-grad); border: none; transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 0, 127, 0.4); }

        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 0 20px; }
        .card { background: var(--card-bg); border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: #ff007f; }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 25px; }

        .btn-more { width: 100%; padding: 15px; background: var(--main-grad); border: none; color: white; border-radius: 12px; cursor: pointer; font-weight: 900; }

        .admin-form { display: none; background: #08080c; padding: 30px; border-radius: 25px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 400px; border: 2px solid #00d2ff; }
        .admin-form input, .admin-form select { width: 100%; padding: 12px; margin: 10px 0; background: #151525; border: 1px solid #333; color: white; border-radius: 10px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0f; margin: 5% auto; padding: 40px; max-width: 700px; border-radius: 25px; border: 1px solid #333; }
        
        #admin-trigger { position: fixed; bottom: 20px; left: 20px; opacity: 0.1; color: white; background: none; border: none; cursor: pointer; }
        .btn-delete { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        #langBtn { background: #222; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .social-icons a { color: white; font-size: 1.8rem; margin-left: 15px; transition: 0.3s; }
        .social-icons a:hover { color: #ff007f; transform: scale(1.2); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Mystery GDPS</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div class="social-icons">
                <a href="https://t.me/mysteryxgdps" target="_blank"><i class="fab fa-telegram"></i></a>
                <a href="https://www.youtube.com/@lichigmdj98" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
            <button onclick="toggleLang()" id="langBtn">RU</button>
        </div>
    </nav>

    <div class="hero"><h1 id="txtHero">DEMON LIST</h1></div>

    <div class="mode-tabs">
        <button id="tabDemons" class="tab-btn active" onclick="switchTab('demons')">Demon List</button>
        <button id="tabCreators" class="tab-btn" onclick="switchTab('creators')">Creator List</button>
    </div>

    <div class="container" id="mainContainer"></div>

    <button id="admin-trigger" onclick="openAdmin()"><i class="fas fa-cog"></i></button>

    <div id="adminPanel" class="admin-form">
        <h2 style="text-align:center;">ADMIN</h2>
        <input type="password" id="adminPass" placeholder="Пароль">
        <select id="admAction" onchange="toggleAdmFields()">
            <option value="add_demon">Добавить Демона</option>
            <option value="add_creator">Добавить Креатора</option>
            <option value="add_victor">Добавить Виктора</option>
            <option value="delete_mode">Режим удаления</option>
        </select>
        <div id="fields_common">
            <input type="text" id="itemName" placeholder="Имя">
            <input type="text" id="itemVal" placeholder="Автор / CP">
            <input type="text" id="itemImg" placeholder="Картинка URL">
            <input type="text" id="itemVid" placeholder="YouTube ID">
        </div>
        <div id="fields_victor" style="display:none;">
            <select id="selectDemon" style="width:100%; padding:12px;"></select>
            <input type="text" id="vicName" placeholder="Ник игрока">
            <input type="text" id="vicAtt" placeholder="Попытки">
            <input type="text" id="vicPerc" placeholder="Процент">
        </div>
        <button class="btn-more" onclick="processAdmin()">OK</button>
        <button class="btn-more" style="background:#222; margin-top:10px;" onclick="closeAdmin()">Cancel</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-content" id="modalData"></div></div>

    <script>
        // Твоя конфигурация уже вставлена!
        const firebaseConfig = {
            apiKey: "AIzaSyBugYw3fPo4r7Q0e4jDjBUd-JBbCspghE8",
            authDomain: "mysterygdps-30547.firebaseapp.com",
            databaseURL: "https://mysterygdps-30547-default-rtdb.firebaseio.com",
            projectId: "mysterygdps-30547",
            storageBucket: "mysterygdps-30547.firebasestorage.app",
            messagingSenderId: "12553952733",
            appId: "1:12553952733:web:fa603d37c8c08dddefaa34",
            measurementId: "G-WVMTYWT40L"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentLang = 'EN';
        let isDeleteMode = false;
        let demons = []; let creators = []; let dKeys = []; let cKeys = [];

        const dict = {
            EN: { hero: "DEMON LIST", more: "DETAILS", vics: "Victors", empty: "None", del: "DELETE" },
            RU: { hero: "СПИСОК ДЕМОНОВ", more: "ПОДРОБНЕЕ", vics: "Победители", empty: "Нет", del: "УДАЛИТЬ" }
        };

        // Живое обновление из базы
        db.ref('demons').on('value', s => { 
            const val = s.val(); 
            demons = val ? Object.values(val) : []; 
            dKeys = val ? Object.keys(val) : []; 
            render(); 
        });
        db.ref('creators').on('value', s => { 
            const val = s.val(); 
            creators = val ? Object.values(val) : []; 
            cKeys = val ? Object.keys(val) : []; 
            render(); 
        });

        function toggleLang() {
            currentLang = currentLang === 'EN' ? 'RU' : 'EN';
            document.getElementById('langBtn').innerText = currentLang === 'EN' ? 'RU' : 'EN';
            document.getElementById('txtHero').innerText = dict[currentLang].hero;
            render();
        }

        function render() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = '';
            const isDem = document.getElementById('tabDemons').classList.contains('active');
            
            if(isDem) {
                demons.forEach((d, i) => {
                    container.innerHTML += `
                        <div class="card">
                            ${isDeleteMode ? `<button class="btn-delete" onclick="deleteGlobal('${dKeys[i]}','demons')">${dict[currentLang].del}</button>` : ''}
                            <img src="${d.img || 'https://via.placeholder.com/400x200'}" class="card-img">
                            <div class="card-body">
                                <h3 style="margin:0;">#${i+1} ${d.name}</h3>
                                <p>by ${d.author}</p>
                                <button class="btn-more" onclick="showInfo(${i})">${dict[currentLang].more}</button>
                            </div>
                        </div>`;
                });
            } else {
                creators.sort((a,b)=>b.points-a.points).forEach((c, i) => {
                    container.innerHTML += `
                        <div class="card">
                            ${isDeleteMode ? `<button class="btn-delete" onclick="deleteGlobal('${cKeys[i]}','creators')">${dict[currentLang].del}</button>` : ''}
                            <div class="card-body"><h3>#${i+1} ${c.name}</h3><p style="color:#00d2ff; font-weight:bold;">${c.points} CP</p></div>
                        </div>`;
                });
            }
        }

        function processAdmin() {
            if(document.getElementById('adminPass').value !== "123") return alert("Wrong Password!");
            const act = document.getElementById('admAction').value;
            const idVal = (name) => document.getElementById(name).value;

            if(act === 'add_demon') db.ref('demons').push({ name: idVal('itemName'), author: idVal('itemVal'), img: idVal('itemImg'), vid: idVal('itemVid'), victors: [] });
            else if(act === 'add_creator') db.ref('creators').push({ name: idVal('itemName'), points: parseInt(idVal('itemVal')) });
            else if(act === 'add_victor') {
                const idx = document.getElementById('selectDemon').value;
                const vics = demons[idx].victors || [];
                vics.push({ name: idVal('vicName'), att: idVal('vicAtt'), perc: idVal('vicPerc') });
                db.ref('demons/'+dKeys[idx]).update({ victors: vics });
            }
            else if(act === 'delete_mode') isDeleteMode = !isDeleteMode;
            closeAdmin(); render();
        }

        function deleteGlobal(key, type) { if(confirm("Удалить навсегда?")) db.ref(type+'/'+key).remove(); }

        function showInfo(i) {
            const d = demons[i];
            const vH = d.victors ? d.victors.map(v => `<div style="padding:10px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:10px;"><b>${v.name}</b> - ${v.perc} (${v.att} att)</div>`).join('') : dict[currentLang].empty;
            document.getElementById('modalData').innerHTML = `
                <h2 style="margin-top:0;">${d.name}</h2>
                <iframe width="100%" height="350" src="https://www.youtube.com/embed/${d.vid}" frameborder="0" allowfullscreen style="border-radius:15px;"></iframe>
                <h3>${dict[currentLang].vics}:</h3>
                <div style="max-height:200px; overflow-y:auto;">${vH}</div>
                <button class="btn-more" style="margin-top:20px; background:#222;" onclick="closeModal()">CLOSE</button>
            `;
            document.getElementById('detailModal').style.display='block';
        }

        function toggleAdmFields() {
            const act = document.getElementById('admAction').value;
            document.getElementById('fields_common').style.display = act.includes('add_demon') || act.includes('add_creator') ? 'block' : 'none';
            document.getElementById('fields_victor').style.display = act === 'add_victor' ? 'block' : 'none';
            if(act === 'add_victor') document.getElementById('selectDemon').innerHTML = demons.map((d,i)=>`<option value="${i}">${d.name}</option>`).join('');
        }
        function switchTab(t) { 
            document.getElementById('tabDemons').classList.toggle('active', t === 'demons');
            document.getElementById('tabCreators').classList.toggle('active', t === 'creators');
            render(); 
        }
        function openAdmin() { document.getElementById('adminPanel').style.display='block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
        function closeModal() { document.getElementById('detailModal').style.display='none'; }
    </script>
</body>
</html>
