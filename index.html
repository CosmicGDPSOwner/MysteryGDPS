<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mysteryx GDPS | Official Global List</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #12121a;
            --card-bg: #1a1a24;
            --main-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 25%, #ff007f 100%);
            --accent-pink: #ff007f;
            --accent-blue: #00d2ff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; width: 100%; }

        /* ФОН */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: var(--bg); overflow: hidden; }
        .grid-overlay {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 210, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 15s linear infinite;
        }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(60px); } }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 10s ease-in-out infinite; }
        .orb-1 { width: 700px; height: 700px; background: var(--accent-pink); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: var(--accent-blue); bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, 50px); } }

        /* НАВИГАЦИЯ */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(18,18,26,0.9); backdrop-filter: blur(20px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: 'Montserrat'; font-size: 1.5rem; font-weight: 900; background: var(--main-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .nav-links { display: flex; align-items: center; gap: 15px; }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 700; transition: 0.3s; font-size: 0.75rem; text-transform: uppercase; }

        /* WELCOME SECTION (HERO) */
        .welcome-hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px 20px; }
        .welcome-hero h1 { font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 6rem); margin: 0; line-height: 1; text-transform: uppercase; letter-spacing: 2px; }
        .welcome-hero p { font-size: 1rem; color: #aaa; max-width: 700px; margin: 20px 0 35px; line-height: 1.4; }
        .hero-btns { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn-main, .btn-outline { padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 900; font-size: 0.9rem; transition: 0.3s; text-align: center; }
        .btn-main { background: var(--main-grad); color: white; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2); }
        .btn-outline { border: 2px solid white; color: white; }

        /* ПОИСК И СПИСОК */
        .search-box { max-width: 600px; margin: 0 auto 30px; position: relative; padding: 0 15px; }
        .search-input { width: 100%; padding: 12px 15px 12px 45px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 0.9rem; outline: none; }
        .search-icon { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); color: #888; }

        .hero-title { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px 20px 30px; text-align: center; }
        .hero-title h2 { font-family: 'Montserrat'; font-size: 2.2rem; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        .top-50-text { color: #ff3333; font-family: 'Montserrat'; font-weight: 900; font-size: 1.5rem; margin-top: 5px; letter-spacing: 5px; animation: pulse 2s infinite; }

        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); position: relative; transition: 0.4s; }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; }
        .demon-tag { position: absolute; top: 12px; left: 12px; background: var(--main-grad); color: white; padding: 6px 12px; border-radius: 8px; font-weight: 900; font-size: 0.7rem; z-index: 50; }
        .level-id-box { display: flex; align-items: center; gap: 8px; background: rgba(0, 210, 255, 0.08); padding: 10px 15px; border-radius: 12px; color: var(--accent-blue); cursor: pointer; margin-bottom: 15px; font-weight: 700; font-size: 0.9rem; width: fit-content; }

        .mode-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; padding: 0 10px; }
        .tab-btn { padding: 12px 25px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 0.8rem; flex: 1; max-width: 180px; }
        .tab-btn.active { background: white; color: black; }

        /* АДМИНКА (АДАПТИВНАЯ) */
        #admin-trigger { position: fixed; bottom: 20px; left: 20px; opacity: 0.2; cursor: pointer; font-size: 1.2rem; background: none; border: none; color: white; z-index: 1000; }
        .admin-form { 
            display: none; background: #121220; padding: 25px; border-radius: 20px; 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 2000; width: 90%; max-width: 450px; 
            max-height: 90vh; overflow-y: auto; /* Добавлено для мобилок */
            border: 2px solid var(--accent-blue); 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .admin-form input, .admin-form select { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a2a; border: 1px solid #333; color: white; border-radius: 10px; font-size: 0.9rem; }

        /* МОДАЛКА (АДАПТИВНАЯ) */
        .modal-content { background: #1a1a24; margin: 5vh auto; padding: 25px; max-width: 800px; width: 92%; border-radius: 25px; border: 1px solid #333; position: relative; }

        /* АДАПТИВНОСТЬ ПОД МОБИЛКИ */
        @media (max-width: 600px) {
            .navbar { padding: 10px 15px; }
            .logo { font-size: 1.2rem; }
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 0.65rem; }
            #langBtn { padding: 3px 6px !important; font-size: 10px; }
            
            .hero-title h2 { font-size: 1.8rem; }
            .top-50-text { font-size: 1.2rem; letter-spacing: 3px; }
            
            .container { grid-template-columns: 1fr; gap: 20px; }
            
            .welcome-hero h1 { letter-spacing: 1px; }
            .welcome-hero p { font-size: 0.9rem; }
            
            .admin-form { padding: 20px; }
            .modal-content { padding: 20px; margin: 2vh auto; }
            .modal-content h2 { font-size: 1.5rem !important; }
        }

        footer { padding: 40px 20px; text-align: center; background: rgba(10, 10, 15, 0.9); margin-top: 60px; border-top: 1px solid #222; }
        .footer-socials { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .btn-more { width: 100%; padding: 15px; background: var(--main-grad); border: none; color: white; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 0.9rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; backdrop-filter: blur(15px); overflow-y: auto; }
        #copyToast { visibility: hidden; background: var(--accent-blue); color: white; padding: 15px 30px; position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); border-radius: 12px; z-index: 5000; font-weight: 900; font-size: 0.8rem; }
        #copyToast.show { visibility: visible; animation: fadeInUp 0.4s; }
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 10px; border-left: 3px solid var(--accent-pink); font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="copyToast">ID Скопировано!</div>
    <div class="bg-wrapper"><div class="grid-overlay"></div><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <nav class="navbar">
        <div class="logo" onclick="window.scrollTo(0,0)">Mysteryx GDPS</div>
        <div class="nav-links">
            <a href="#listSection">List</a>
            <a href="https://t.me/mysteryxgdps" target="_blank">TG</a>
            <a href="https://www.youtube.com/@lichigmdj98" target="_blank">YT</a>
            <button onclick="toggleLang()" id="langBtn" style="background:none; border:1px solid #444; color:white; padding:5px 10px; cursor:pointer; border-radius:5px;">RU</button>
        </div>
    </nav>

    <header class="welcome-hero">
        <h1 id="welcomeTitle">MYSTERYX GDPS</h1>
        <p id="welcomeDesc">Окунись в мир самого амбициозного приватного сервера Geometry Dash.</p>
        <div class="hero-btns">
            <a href="https://t.me/mysteryxgdps" target="_blank" class="btn-main">ИГРАТЬ СЕЙЧАС</a>
            <a href="#listSection" class="btn-outline">DEMON LIST</a>
        </div>
    </header>

    <section id="listSection">
        <div class="hero-title">
            <h2 id="txtHero">DEMON LIST</h2>
            <div class="top-50-text" id="top50Banner">TOP 50</div>
        </div>

        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск..." oninput="render()">
        </div>

        <div class="mode-tabs">
            <button id="tabDemons" class="tab-btn active" onclick="switchTab('demons')">Demons</button>
            <button id="tabCreators" class="tab-btn" onclick="switchTab('creators')">Creators</button>
        </div>
        
        <div class="container" id="mainContainer"></div>
    </section>

    <footer>
        <div class="footer-socials">
            <a href="https://t.me/mysteryxgdps" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://www.youtube.com/@lichigmdj98" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
        <p>© 2026 Mysteryx GDPS.</p>
    </footer>

    <button id="admin-trigger" onclick="openAdmin()"><i class="fas fa-cog"></i></button>

    <div id="adminPanel" class="admin-form">
        <h2 style="text-align:center; font-family: Montserrat; font-size: 1.2rem;">ADMIN PANEL</h2>
        <input type="password" id="adminPass" placeholder="Пароль">
        <select id="admAction" onchange="toggleAdmFields()">
            <option value="add_demon">Добавить Демона</option>
            <option value="add_creator">Добавить Креатора</option>
            <option value="add_victor">Добавить Рекорд</option>
            <option value="delete_mode">Удаление / Движение</option>
        </select>
        
        <div id="fields_main">
            <input type="text" id="itemName" placeholder="Название / Ник">
            <input type="text" id="itemVal" placeholder="Автор / CP">
            <div id="fields_demon">
                <input type="text" id="itemID" placeholder="ID Уровня">
                <input type="text" id="itemTag" placeholder="Тег (напр. Top 1)">
                <input type="text" id="itemVerifier" placeholder="Верифер">
                <input type="text" id="itemImgURL" placeholder="Ссылка на картинку">
                <input type="text" id="itemVid" placeholder="Ссылка на YouTube">
            </div>
        </div>
        <div id="fields_victor" style="display:none;">
            <select id="selectDemon" style="width:100%"></select>
            <input type="text" id="vicName" placeholder="Ник игрока">
            <input type="text" id="vicPerc" placeholder="Проценты">
            <input type="text" id="vicAtt" placeholder="Попытки">
        </div>

        <button class="btn-more" onclick="processAdmin()">ВЫПОЛНИТЬ</button>
        <button class="btn-more" style="background:#222; margin-top:10px;" onclick="closeAdmin()">ЗАКРЫТЬ</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-content" id="modalData"></div></div>

    <script>
        const SECRET_HASH = "80f681a9425035255476d0042456345688753239";
        const firebaseConfig = {
            apiKey: "AIzaSyBugYw3fPo4r7Q0e4jDjBUd-JBbCspghE8",
            authDomain: "mysterygdps-30547.firebaseapp.com",
            databaseURL: "https://mysterygdps-30547-default-rtdb.firebaseio.com",
            projectId: "mysterygdps-30547",
            storageBucket: "mysterygdps-30547.firebasestorage.app",
            messagingSenderId: "12553952733",
            appId: "1:12553952733:web:fa603d37c8c08dddefaa34"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentLang = 'RU'; let isDeleteMode = false;
        let demons = []; let creators = [];

        db.ref('demons').on('value', s => { 
            const val = s.val(); 
            demons = val ? Object.entries(val).map(([k, d]) => ({ key: k, ...d })).sort((a,b)=>(a.order||0)-(b.order||0)) : [];
            const sel = document.getElementById('selectDemon');
            if(sel) sel.innerHTML = demons.map(d => `<option value="${d.key}">${d.name}</option>`).join('');
            render(); 
        });
        db.ref('creators').on('value', s => { 
            const val = s.val(); 
            creators = val ? Object.entries(val).map(([k, d]) => ({ key: k, ...d })).sort((a,b)=>parseInt(b.points)-parseInt(a.points)) : [];
            render(); 
        });

        async function hashString(str) {
            const buffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function render() {
            const container = document.getElementById('mainContainer');
            const isDem = document.getElementById('tabDemons').classList.contains('active');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const topBanner = document.getElementById('top50Banner');
            
            container.innerHTML = '';
            document.getElementById('txtHero').innerText = isDem ? (currentLang==='EN'?'DEMON LIST':'СПИСОК ДЕМОНОВ') : (currentLang==='EN'?'CREATOR TOP':'ТОП КРЕАТОРОВ');
            topBanner.style.display = isDem ? 'block' : 'none';

            if(isDem) {
                const filtered = demons.filter(d => d.name.toLowerCase().includes(query) || d.author.toLowerCase().includes(query));
                filtered.forEach((d, i) => {
                    container.innerHTML += `
                        <div class="card">
                            ${isDeleteMode ? `<div style="position:absolute; top:10px; right:10px; z-index:100; display:flex; gap:5px;">
                                <button onclick="moveItem(${i}, -1)">↑</button>
                                <button onclick="moveItem(${i}, 1)">↓</button>
                                <button style="background:red;" onclick="deleteItem('${d.key}','demons')">X</button>
                            </div>` : ''}
                            ${d.tag ? `<div class="demon-tag">${d.tag}</div>` : ''}
                            <img src="${d.img}" class="card-img" onerror="this.src='https://via.placeholder.com/600x300/111/fff?text=Mysteryx'">
                            <div class="card-body">
                                <h3 style="margin:0; color:var(--accent-blue); font-size:1.1rem;">#${i+1} ${d.name}</h3>
                                <p style="color:#888; margin: 5px 0 15px; font-size:0.85rem;">by ${d.author}</p>
                                <div class="level-id-box" onclick="copyID('${d.levelID}')">ID: ${d.levelID}</div>
                                <button class="btn-more" onclick="showInfoByKey('${d.key}')">${currentLang==='EN'?'DETAILS':'ПОДРОБНЕЕ'}</button>
                            </div>
                        </div>`;
                });
            } else {
                const filtered = creators.filter(c => c.name.toLowerCase().includes(query));
                filtered.forEach((c, i) => {
                    container.innerHTML += `<div class="card">
                        ${isDeleteMode ? `<div style="position:absolute; top:10px; right:10px; z-index:100;">
                            <button style="background:red;" onclick="deleteItem('${c.key}','creators')">X</button>
                        </div>` : ''}
                        <div class="card-body" style="display:flex; justify-content:space-between; align-items:center; padding:25px;">
                            <h3 style="margin:0; font-size:1.1rem;">#${i+1} ${c.name}</h3>
                            <div style="text-align:right;"><span style="font-size:1.2rem; color:var(--accent-blue); font-weight:900;">${c.points} CP</span></div>
                        </div>
                    </div>`;
                });
            }
        }

        async function processAdmin() {
            const passField = document.getElementById('adminPass');
            const rawPass = passField.value.trim().toLowerCase();
            const h = await hashString(rawPass);
            if(h === SECRET_HASH || rawPass === "mysteryxgdpsold777") {
                const act = document.getElementById('admAction').value;
                if(act === 'add_demon') {
                    let r = document.getElementById('itemVid').value;
                    let v = r.includes('v=') ? r.split('v=')[1].split('&')[0] : r.includes('youtu.be/') ? r.split('youtu.be/')[1].split('?')[0] : r;
                    db.ref('demons').push({ name: document.getElementById('itemName').value, author: document.getElementById('itemVal').value, levelID: document.getElementById('itemID').value, tag: document.getElementById('itemTag').value, verifier: document.getElementById('itemVerifier').value, img: document.getElementById('itemImgURL').value, vid: v, order: demons.length });
                } else if(act === 'add_creator') {
                    db.ref('creators').push({ name: document.getElementById('itemName').value, points: parseInt(document.getElementById('itemVal').value) || 0 });
                } else if(act === 'add_victor') {
                    const dKey = document.getElementById('selectDemon').value;
                    db.ref(`demons/${dKey}/victors`).push({ 
                        name: document.getElementById('vicName').value, 
                        perc: document.getElementById('vicPerc').value, 
                        att: document.getElementById('vicAtt').value 
                    });
                } else if(act === 'delete_mode') { isDeleteMode = !isDeleteMode; render(); }
                closeAdmin();
            } else { alert("Error!"); }
        }

        function showInfoByKey(key) {
            const d = demons.find(x => x.key === key);
            const vics = d.victors ? Object.entries(d.victors).map(([vk, v]) => `
                <div class="record-item">
                    <span><b>${v.name}</b> — <span style="color:var(--accent-blue)">${v.perc || '100%'}</span> (${v.att || '0'} att)</span>
                    ${isDeleteMode ? `<i class="fas fa-times" style="color:red; cursor:pointer;" onclick="deleteVictor('${d.key}', '${vk}')"></i>` : ''}
                </div>`).join('') : "<p style='color:#666;'>No records yet</p>";

            document.getElementById('modalData').innerHTML = `
                <h2 style="font-family:Montserrat; font-size:1.5rem; margin:0;">${d.name}</h2>
                <p style="color:#888; font-size:0.8rem;">by ${d.author} ${d.verifier ? '| Verified by ' + d.verifier : ''}</p>
                <div style="width:100%; aspect-ratio:16/9; margin:15px 0;">
                    <iframe style="width:100%; height:100%; border-radius:15px; border:1px solid #333;" src="https://www.youtube.com/embed/${d.vid}" frameborder="0" allowfullscreen></iframe>
                </div>
                <h3 style="margin-bottom:10px; font-size:1.1rem;">Victors & Records:</h3>
                <div style="max-height:200px; overflow-y:auto; padding-right:5px;">${vics}</div>
                <button class="btn-more" style="background:#222; margin-top:20px;" onclick="document.getElementById('detailModal').style.display='none'">CLOSE</button>`;
            
            document.getElementById('detailModal').style.display='block';
        }

        function deleteVictor(dk, vk) { 
            if(confirm("Удалить рекорд?")) {
                db.ref(`demons/${dk}/victors/${vk}`).remove().then(() => {
                    document.getElementById('detailModal').style.display='none';
                });
            } 
        }

        function copyID(id) { navigator.clipboard.writeText(id); const t = document.getElementById("copyToast"); t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function moveItem(index, dir) {
            let target = index + dir; if (target < 0 || target >= demons.length) return;
            const updates = {}; updates[`/demons/${demons[index].key}/order`] = target; updates[`/demons/${demons[target].key}/order`] = index;
            db.ref().update(updates);
        }
        function toggleAdmFields() { 
            const a = document.getElementById('admAction').value; 
            document.getElementById('fields_main').style.display = (a === 'add_demon' || a === 'add_creator') ? 'block' : 'none'; 
            document.getElementById('fields_demon').style.display = a === 'add_demon' ? 'block' : 'none'; 
            document.getElementById('fields_victor').style.display = a === 'add_victor' ? 'block' : 'none'; 
        }
        function openAdmin() { document.getElementById('adminPanel').style.display='block'; toggleAdmFields(); }
        function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
        function switchTab(t) { document.getElementById('tabDemons').classList.toggle('active', t==='demons'); document.getElementById('tabCreators').classList.toggle('active', t==='creators'); render(); }
        function toggleLang() { currentLang = currentLang === 'RU' ? 'EN' : 'RU'; render(); }
        function deleteItem(k, p) { if(confirm("Del?")) db.ref(p+'/'+k).remove(); }
    </script>
</body>
</html>
