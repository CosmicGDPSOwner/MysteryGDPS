<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysteryx GDPS | Official Global List</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #030308;
            --main-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 25%, #ff007f 100%);
            --accent-pink: #ff007f;
            --accent-blue: #00d2ff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --neon-glow: 0 0 20px rgba(0, 210, 255, 0.4);
            --logo-glow: 0 0 20px rgba(0, 210, 255, 0.6), 0 0 40px rgba(255, 0, 127, 0.4);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- АНИМИРОВАННЫЙ ФОН --- */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #030308; overflow: hidden; }
        
        .grid-overlay {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.07) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 210, 255, 0.07) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 15s linear infinite;
        }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(60px); } }

        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.2; animation: orbit 25s infinite alternate; }
        .orb-1 { width: 700px; height: 700px; background: var(--accent-pink); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: var(--accent-blue); bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 400px; height: 400px; background: #7000ff; top: 30%; left: 30%; animation-duration: 18s; }
        @keyframes orbit { from { transform: translate(0, 0) scale(1); } to { transform: translate(150px, 80px) scale(1.3); } }

        /* --- ИНТЕРФЕЙС --- */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.08); }
        
        .logo { 
            font-family: 'Montserrat'; font-size: 2.3rem; font-weight: 900; 
            background: var(--main-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(var(--logo-glow)); letter-spacing: -1px;
        }

        .hero { text-align: center; padding: 70px 20px 40px; }
        .hero h1 { 
            font-family: 'Montserrat'; font-size: clamp(2.8rem, 9vw, 5.5rem); 
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; text-transform: uppercase; letter-spacing: -3px;
        }

        #langBtn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 25px; border-radius: 12px; cursor: pointer; font-weight: 900; transition: 0.3s; }
        #langBtn:hover { background: var(--main-grad); box-shadow: var(--neon-glow); border-color: transparent; }

        .mode-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .tab-btn { padding: 16px 35px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; border-radius: 16px; font-weight: 900; cursor: pointer; transition: 0.4s; text-transform: uppercase; backdrop-filter: blur(10px); }
        .tab-btn.active { background: white; color: black; transform: translateY(-5px); border: none; box-shadow: 0 10px 30px rgba(255,255,255,0.2); }

        /* --- КАРТОЧКИ --- */
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 35px; padding: 20px; }
        .card { 
            background: rgba(255, 255, 255, 0.03); border-radius: 30px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.06); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; backdrop-filter: blur(15px);
        }
        .card:hover { transform: translateY(-15px); border-color: var(--accent-blue); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .tag { position: absolute; top: 15px; left: 15px; background: var(--main-grad); padding: 6px 18px; border-radius: 10px; font-size: 0.8rem; font-weight: 900; z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        .card-img { width: 100%; height: 200px; object-fit: cover; opacity: 0.85; transition: 0.6s; }
        .card:hover .card-img { transform: scale(1.1); opacity: 1; }

        .card-body { padding: 25px; }
        .card-body h3 { margin: 0; font-family: 'Montserrat'; font-size: 1.6rem; margin-bottom: 10px; }

        .btn-more { width: 100%; padding: 15px; background: var(--main-grad); border: none; color: white; border-radius: 14px; cursor: pointer; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .btn-more:hover { filter: brightness(1.2); box-shadow: 0 0 25px rgba(255, 0, 127, 0.4); }

        /* --- АДМИН ПАНЕЛЬ (КРАСИВАЯ) --- */
        .btn-delete { position: absolute; top: 15px; right: 15px; background: #ff3333; color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; z-index: 20; box-shadow: 0 0 15px rgba(255, 51, 51, 0.4); }
        .reorder-controls { position: absolute; top: 60px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 15; }
        .move-btn { background: rgba(0,0,0,0.85); color: white; border: 1px solid var(--accent-blue); padding: 6px 14px; border-radius: 10px; cursor: pointer; font-weight: 900; transition: 0.3s; }
        .move-btn:hover { background: var(--main-grad); box-shadow: var(--neon-glow); }

        .admin-form { display: none; background: #0a0a12; padding: 35px; border-radius: 30px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 95%; max-width: 450px; border: 1px solid var(--accent-blue); box-shadow: 0 0 100px rgba(0,0,0,0.9); }
        .admin-form input, .admin-form select { width: 100%; padding: 14px; margin: 10px 0; background: #151525; border: 1px solid #333; color: white; border-radius: 12px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 3000; backdrop-filter: blur(25px); }
        .modal-content { background: #0d0d15; margin: 5vh auto; padding: 40px; max-width: 800px; width: 90%; border-radius: 35px; border: 1px solid #333; position: relative; }
        
        #admin-trigger { position: fixed; bottom: 25px; right: 25px; opacity: 0.2; color: white; background: none; border: none; cursor: pointer; font-size: 1.5rem; z-index: 100; transition: 0.4s; }
        #admin-trigger:hover { opacity: 1; color: var(--accent-blue); transform: rotate(45deg); }

        .social-icons a { color: white; font-size: 1.8rem; margin-left: 18px; transition: 0.4s; }
        .social-icons a:hover { color: var(--accent-pink); filter: drop-shadow(var(--neon-glow)); }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="grid-overlay"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo">Mysteryx GDPS</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div class="social-icons">
                <a href="https://t.me/mysteryxgdps" target="_blank"><i class="fab fa-telegram"></i></a>
                <a href="https://www.youtube.com/@lichigmdj98" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
            <button onclick="toggleLang()" id="langBtn">РУС</button>
        </div>
    </nav>

    <div class="hero"><h1 id="txtHero">DEMON LIST</h1></div>

    <div class="mode-tabs">
        <button id="tabDemons" class="tab-btn active" onclick="switchTab('demons')">Demons</button>
        <button id="tabCreators" class="tab-btn" onclick="switchTab('creators')">Creators</button>
    </div>

    <div class="container" id="mainContainer"></div>

    <button id="admin-trigger" onclick="openAdmin()"><i class="fas fa-shield-alt"></i></button>

    <div id="adminPanel" class="admin-form">
        <h2 style="text-align:center; font-family:'Montserrat'; letter-spacing:1px;">ADMIN PANEL</h2>
        <input type="password" id="adminPass" placeholder="Код доступа">
        <select id="admAction" onchange="toggleAdmFields()">
            <option value="add_demon">Добавить Демона</option>
            <option value="add_creator">Добавить Креатора</option>
            <option value="add_victor">Добавить Победителя</option>
            <option value="reorder">Изменить порядок</option>
            <option value="delete_mode">Режим удаления</option>
        </select>
        <div id="fields_common">
            <input type="text" id="itemName" placeholder="Название / Ник">
            <input type="text" id="itemVal" placeholder="Автор / CP">
            <input type="text" id="itemTag" placeholder="Тег (например: Top 1)">
            <input type="text" id="itemImgURL" placeholder="Прямая ссылка на фото (1280x720)">
            <input type="text" id="itemVid" placeholder="YouTube Video ID (например: dQw4w9WgXcQ)">
        </div>
        <div id="fields_victor" style="display:none;">
            <select id="selectDemon"></select>
            <input type="text" id="vicName" placeholder="Ник игрока">
            <input type="text" id="vicAtt" placeholder="Попытки">
            <input type="text" id="vicPerc" placeholder="Процент">
        </div>
        <button class="btn-more" onclick="processAdmin()">ПРИМЕНИТЬ</button>
        <button class="btn-more" style="background:#151525; margin-top:10px;" onclick="closeAdmin()">ЗАКРЫТЬ</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-content" id="modalData"></div></div>

    <script>
        const SECRET_HASH = "40bd001563085fc35165329ea1ff5c5ecbdbbeef"; // Код 123
        async function hashString(str) {
            const buffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBugYw3fPo4r7Q0e4jDjBUd-JBbCspghE8",
            authDomain: "mysterygdps-30547.firebaseapp.com",
            databaseURL: "https://mysterygdps-30547-default-rtdb.firebaseio.com",
            projectId: "mysterygdps-30547",
            storageBucket: "mysterygdps-30547.firebasestorage.app",
            messagingSenderId: "12553952733",
            appId: "1:12553952733:web:fa603d37c8c08dddefaa34"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentLang = 'EN';
        let isDeleteMode = false;
        let isReorderMode = false;
        let demons = []; let creators = [];

        const dict = {
            EN: { hero: "DEMON LIST", more: "DETAILS", vics: "Victors", del: "DELETE" },
            RU: { hero: "СПИСОК ДЕМОНОВ", more: "ПОДРОБНЕЕ", vics: "Победители", del: "УДАЛИТЬ" }
        };

        db.ref('demons').on('value', s => { 
            const val = s.val(); 
            if(val) {
                const entries = Object.entries(val).map(([key, data]) => ({ key, ...data }));
                entries.sort((a, b) => (a.order || 0) - (b.order || 0));
                demons = entries;
            } else { demons = []; }
            render(); 
        });

        db.ref('creators').on('value', s => { 
            const val = s.val(); 
            creators = val ? Object.values(val) : []; 
            render(); 
        });

        function render() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = '';
            const isDem = document.getElementById('tabDemons').classList.contains('active');
            
            if(isDem) {
                demons.forEach((d, i) => {
                    container.innerHTML += `
                        <div class="card">
                            ${d.tag ? `<div class="tag">${d.tag}</div>` : ''}
                            ${isDeleteMode ? `<button class="btn-delete" onclick="deleteGlobal('${d.key}','demons')">${dict[currentLang].del}</button>` : ''}
                            ${isReorderMode ? `
                                <div class="reorder-controls">
                                    <button class="move-btn" onclick="moveItem(${i}, -1)">↑</button>
                                    <button class="move-btn" onclick="moveItem(${i}, 1)">↓</button>
                                </div>
                            ` : ''}
                            <img src="${d.img || 'https://via.placeholder.com/1280x720'}" class="card-img">
                            <div class="card-body">
                                <h3 style="background:var(--main-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">#${i+1} ${d.name}</h3>
                                <p style="color:rgba(255,255,255,0.4); margin:10px 0 10px;">by ${d.author}</p>
                                <button class="btn-more" onclick="showInfo(${i})">${dict[currentLang].more}</button>
                            </div>
                        </div>`;
                });
            } else {
                creators.sort((a,b)=>b.points-a.points).forEach((c, i) => {
                    container.innerHTML += `<div class="card"><div class="card-body"><h3>#${i+1} ${c.name}</h3><p style="color:var(--accent-blue); font-weight:900;">${c.points} CP</p></div></div>`;
                });
            }
        }

        async function processAdmin() {
            const typedPass = document.getElementById('adminPass').value;
            const typedHash = await hashString(typedPass);
            if(typedHash !== SECRET_HASH) return alert("Wrong Code");
            const act = document.getElementById('admAction').value;
            
            if(act === 'add_demon') {
                db.ref('demons').push({ 
                    name: document.getElementById('itemName').value, 
                    author: document.getElementById('itemVal').value, 
                    tag: document.getElementById('itemTag').value, 
                    img: document.getElementById('itemImgURL').value, 
                    vid: document.getElementById('itemVid').value,
                    order: demons.length 
                });
            } else if(act === 'add_creator') {
                db.ref('creators').push({ name: document.getElementById('itemName').value, points: parseInt(document.getElementById('itemVal').value) });
            } else if(act === 'add_victor') {
                const idx = document.getElementById('selectDemon').value;
                const vics = demons[idx].victors || [];
                vics.push({ name: document.getElementById('vicName').value, att: document.getElementById('vicAtt').value, perc: document.getElementById('vicPerc').value });
                db.ref('demons/'+demons[idx].key).update({ victors: vics });
            } else if(act === 'delete_mode') { isDeleteMode = !isDeleteMode; isReorderMode = false; }
            else if(act === 'reorder') { isReorderMode = !isReorderMode; isDeleteMode = false; }
            
            closeAdmin(); render();
        }

        function moveItem(index, direction) {
            let newIndex = index + direction;
            if (newIndex < 0 || newIndex >= demons.length) return;
            const itemA = demons[index];
            const itemB = demons[newIndex];
            db.ref('demons/' + itemA.key).update({ order: newIndex });
            db.ref('demons/' + itemB.key).update({ order: index });
        }

        function deleteGlobal(key, type) { if(confirm("Удалить?")) db.ref(type+'/'+key).remove(); }
        
        function showInfo(i) {
            const d = demons[i];
            const vH = d.victors ? d.victors.map(v => `<div style="padding:15px; background:rgba(255,255,255,0.03); margin-bottom:8px; border-radius:15px; border-left:4px solid var(--accent-pink);"><b>${v.name}</b>: ${v.perc} (${v.att} att)</div>`).join('') : "No victors yet.";
            document.getElementById('modalData').innerHTML = `
                <h2 style="font-family:'Montserrat'; font-size:2rem; background:var(--main-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent; margin-bottom:25px;">${d.name}</h2>
                <div style="position:relative; padding-bottom:56.25%; height:0; border-radius:20px; overflow:hidden; border:1px solid #333; margin-bottom:25px;">
                    <iframe style="position:absolute; top:0; left:0; width:100%; height:100%;" src="https://www.youtube.com/embed/${d.vid}" frameborder="0" allowfullscreen></iframe>
                </div>
                <h3>${dict[currentLang].vics}:</h3>
                <div style="max-height:250px; overflow-y:auto; padding-right:10px;">${vH}</div>
                <button class="btn-more" style="margin-top:25px; background:#111; border:1px solid #333;" onclick="closeModal()">CLOSE</button>
            `;
            document.getElementById('detailModal').style.display='block';
        }

        function toggleLang() {
            currentLang = currentLang === 'EN' ? 'RU' : 'EN';
            document.getElementById('langBtn').innerText = currentLang === 'EN' ? 'РУС' : 'ENG';
            document.getElementById('txtHero').innerText = dict[currentLang].hero;
            render();
        }
        function toggleAdmFields() {
            const act = document.getElementById('admAction').value;
            document.getElementById('fields_common').style.display = (act.includes('add_demon') || act.includes('add_creator')) ? 'block' : 'none';
            document.getElementById('fields_victor').style.display = (act === 'add_victor') ? 'block' : 'none';
            if(act === 'add_victor') document.getElementById('selectDemon').innerHTML = demons.map((d,i)=>`<option value="${i}">${d.name}</option>`).join('');
        }
        function switchTab(t) { 
            document.getElementById('tabDemons').classList.toggle('active', t === 'demons');
            document.getElementById('tabCreators').classList.toggle('active', t === 'creators');
            render(); 
        }
        function openAdmin() { document.getElementById('adminPanel').style.display='block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
        function closeModal() { document.getElementById('detailModal').style.display='none'; }
    </script>
</body>
</html>
