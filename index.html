    <style>

            --card-bg: #1a1a24;
            --main-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 25%, #ff007f 100%);

                              linear-gradient(90deg, rgba(0, 210, 255, 0.1) 1px, transparent 1px);

            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 15s linear infinite;

        .orb-1 { width: 700px; height: 700px; background: var(--accent-pink); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: var(--accent-blue); bottom: -10%; right: -10%; animation-delay: -5s; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(18,18,26,0.9); backdrop-filter: blur(20px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* ПОИСК И СПИСОК */

        .top-50-text { color: #ff3333; font-family: 'Montserrat'; font-weight: 900; font-size: 2rem; margin-top: 10px; letter-spacing: 10px; animation: pulse 2s infinite; }

        .search-box { max-width: 700px; margin: 0 auto 40px; position: relative; padding: 0 20px; }
        .search-input { width: 100%; padding: 18px 20px 18px 60px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; font-size: 1.1rem; outline: none; transition: 0.3s; }

        .search-icon { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); color: #888; font-size: 1.2rem; }

        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 35px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); position: relative; transition: 0.4s; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .card:hover { transform: translateY(-10px); border-color: var(--accent-blue); }
        .card-img { width: 100%; height: 210px; object-fit: cover; }
        .card-body { padding: 25px; }
        .level-id-box { display: flex; align-items: center; gap: 10px; background: rgba(0, 210, 255, 0.08); padding: 12px 20px; border-radius: 12px; color: var(--accent-blue); cursor: pointer; margin-bottom: 20px; font-weight: 900; font-size: 1rem; width: fit-content; }

        .footer-socials { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .footer-socials a { color: white; font-size: 2rem; transition: 0.3s; opacity: 0.7; }
        .footer-socials a:hover { opacity: 1; color: var(--accent-blue); transform: translateY(-5px); }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            .navbar { padding: 15px 15px; }
            .logo { font-size: 1.2rem; }
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 0.65rem; }
            .welcome-hero h1 { font-size: 2.8rem; }
            .welcome-hero p { font-size: 1rem; margin: 20px 0 35px; }

            .hero-title { padding: 60px 10px 30px; }
            .hero-title h2 { font-size: 1.8rem; }
            .top-50-text { font-size: 1.2rem; letter-spacing: 3px; }
            .search-box { margin-bottom: 25px; }
            .search-input { padding: 15px 15px 15px 50px; font-size: 1rem; }
            .search-icon { left: 25px; }
            .container { grid-template-columns: 1fr; gap: 20px; padding: 10px; }
            .card-body { padding: 20px; }
            .tab-btn { padding: 12px 25px; font-size: 0.9rem; }
            .admin-form { width: 95%; padding: 20px; }
            #copyToast { padding: 15px 30px; font-size: 0.9rem; width: 80%; text-align: center; }
        }

        /* Остальные элементы */
        .mode-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .tab-btn { padding: 15px 40px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #888; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { background: white; color: black; }
        .demon-tag { position: absolute; top: 15px; left: 15px; background: var(--main-grad); color: white; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 0.8rem; z-index: 50; }

        .modal-content { background: #1a1a24; margin: 5vh auto; padding: 30px; max-width: 800px; width: 92%; border-radius: 25px; border: 1px solid #333; position: relative; }
        #copyToast { visibility: hidden; background: var(--accent-blue); color: white; padding: 20px 40px; position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); border-radius: 15px; z-index: 5000; font-weight: 900; }

        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }
        @keyframes fadeInUp { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 40px; } }
    </style>
</head>

        const SECRET_HASH = "80f681a9425035255476d0042456345688753239";
        const firebaseConfig = {
            apiKey: "AIzaSyBugYw3fPo4r7Q0e4jDjBUd-JBbCspghE8",
            authDomain: "mysterygdps-30547.firebaseapp.com",
            databaseURL: "https://mysterygdps-30547-default-rtdb.firebaseio.com",

        let currentLang = 'RU'; 
        let isDeleteMode = false;
        let demons = [];

        const langData = {
            RU: {
                welcomeDesc: "Окунись в мир самого амбициозного приватного сервера Geometry Dash. Стабильность, уникальные уровни и сильнейшее комьюнити.",

        };

        db.ref('creators').on('value', s => { 
            const val = s.val(); 
            creators = val ? Object.entries(val).map(([k, d]) => ({ key: k, ...d })).sort((a,b)=>parseInt(b.points)-parseInt(a.points)) : [];
            render();

        function toggleLang() {
            currentLang = currentLang === 'RU' ? 'EN' : 'RU';
            document.getElementById('langBtn').innerText = currentLang === 'RU' ? 'EN' : 'RU';

        }

        function render() {
            const container = document.getElementById('mainContainer');
            const isDem = document.getElementById('tabDemons').classList.contains('active');

                    container.innerHTML += `

                                <div class="level-id-box" onclick="copyID('${d.levelID}')">ID: ${d.levelID}</div>
                                <button class="btn-more" onclick="showInfoByKey('${d.key}')" style="width:100%; padding:15px; background:var(--main-grad); border:none; color:white; border-radius:12px; cursor:pointer; font-weight:900;">${dict.details}</button>
                            </div>
                        </div>`;
                });
            } else {
                const filtered = creators.filter(c => c.name.toLowerCase().includes(query));

                    container.innerHTML += `<div class="card">

        function toggleAdmFields() {

            document.getElementById('fields_victor').style.display = a === 'add_victor' ? 'block' : 'none';
        }
        async function hashString(str) {
            const buffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        async function processAdmin() {
            const rawPass = document.getElementById('adminPass').value.trim().toLowerCase();
            const h = await hashString(rawPass);
            if(h === SECRET_HASH || rawPass === "mysteryxgdpsold777") {

        function showInfoByKey(key) {
            const d = demons.find(x => x.key === key);
            const dict = langData[currentLang];
            const vics = d.victors ? Object.entries(d.victors).map(([vk, v]) => `<div class="record-item" style="padding:10px; background:#222; margin:5px 0; border-radius:8px;"><b>${v.name}</b>: ${v.perc}%</div>`).join('') : dict.no_records;
            document.getElementById('modalData').innerHTML = `
                <h2 style="font-family:Montserrat;">${d.name}</h2>
                <iframe style="width:100%; aspect-ratio:16/9; border-radius:15px; border:1px solid #333;" src="https://www.youtube.com/embed/${d.vid}" frameborder="0" allowfullscreen></iframe>
                <h3 style="margin-top:20px;">Records:</h3>
                <div style="max-height:200px; overflow-y:auto; margin-top:10px;">${vics}</div>
                <button onclick="document.getElementById('detailModal').style.display='none'" style="width:100%; padding:15px; background:#444; color:#fff; border:none; margin-top:20px; cursor:pointer; border-radius:12px; font-weight:900;">${dict.close}</button>`;
            document.getElementById('detailModal').style.display='block';
        }
    </script>
</body>
</html>
