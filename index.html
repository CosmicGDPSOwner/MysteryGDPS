<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mysteryx GDPS | Official Global List</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #12121a;
            --card-bg: #1a1a24;
            --main-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 25%, #ff007f 100%);
            --accent-pink: #ff007f;
            --accent-blue: #00d2ff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* ФОН */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: var(--bg); overflow: hidden; }
        .grid-overlay {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 210, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 15s linear infinite;
        }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(60px); } }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 10s ease-in-out infinite; }
        .orb-1 { width: 700px; height: 700px; background: var(--accent-pink); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: var(--accent-blue); bottom: -10%; right: -10%; animation-delay: -5s; }

        /* НАВИГАЦИЯ */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(18,18,26,0.9); backdrop-filter: blur(20px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: 'Montserrat'; font-size: 1.3rem; font-weight: 900; background: var(--main-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-links { display: flex; align-items: center; gap: 15px; }
        .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; }

        /* WELCOME SECTION */
        .welcome-hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px 20px 40px; }
        .welcome-hero h1 { font-family: 'Montserrat'; font-size: clamp(2.2rem, 8vw, 6.5rem); margin: 0; line-height: 1.1; text-transform: uppercase; letter-spacing: 2px; }
        .welcome-hero p { font-size: 1rem; color: #aaa; max-width: 600px; margin: 20px 0 40px; line-height: 1.5; }
        .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .btn-main, .btn-outline { padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: 900; font-size: 0.9rem; transition: 0.3s; flex: 1; max-width: 200px; min-width: 140px; }
        .btn-main { background: var(--main-grad); color: white; box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3); }
        .btn-outline { border: 2px solid white; color: white; }

        /* ПОИСК */
        .search-box { max-width: 600px; margin: 0 auto 30px; position: relative; padding: 0 15px; }
        .search-modes { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .search-mode-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #888; padding: 10px 12px; border-radius: 12px; cursor: pointer; font-size: 0.75rem; font-weight: 700; flex: 1; }
        .search-mode-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .search-input { width: 100%; padding: 14px 15px 14px 45px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; font-size: 1rem; outline: none; }
        .search-icon { position: absolute; left: 30px; top: 72%; transform: translateY(-50%); color: #888; }

        .hero-title { padding: 80px 20px 20px; text-align: center; }
        .hero-title h2 { font-family: 'Montserrat'; font-size: clamp(2rem, 10vw, 4rem); margin: 0; text-transform: uppercase; }
        .top-50-text { color: #ff3333; font-family: 'Montserrat'; font-weight: 900; font-size: 1.2rem; letter-spacing: 5px; margin-top: 5px; }

        /* КАРТОЧКИ */
        .container { max-width: 1500px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .card-img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 20px; }
        
        .demon-tag { position: absolute; top: 10px; left: 10px; background: var(--main-grad); color: white; padding: 5px 10px; border-radius: 8px; font-weight: 900; font-size: 0.65rem; }
        .level-id-box { background: rgba(0, 210, 255, 0.1); padding: 8px 12px; border-radius: 10px; color: var(--accent-blue); width: fit-content; margin-bottom: 15px; font-size: 0.85rem; font-weight: 700; }

        /* ТАБЫ */
        .mode-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; padding: 0 15px; }
        .tab-btn { flex: 1; max-width: 150px; padding: 12px; background: rgba(255,255,255,0.05); color: #888; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; font-size: 0.8rem; }
        .tab-btn.active { background: white; color: black; }

        /* УПРАВЛЕНИЕ */
        .admin-controls { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 10px; backdrop-filter: blur(5px); }
        .ctrl-btn { width: 38px; height: 38px; border-radius: 8px; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .btn-up { background: #27ae60; } .btn-down { background: #2980b9; } .btn-del { background: #e74c3c; }

        /* АДМИНКА (ФИКС ДЛЯ ТЕЛЕФОНА) */
        .admin-form { 
            display: none; 
            background: #121220; 
            padding: 25px; 
            border-radius: 25px; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 2000; 
            width: 90%; 
            max-width: 450px; 
            max-height: 85vh; /* Ограничиваем высоту */
            overflow-y: auto; /* Включаем скролл внутри формы */
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .admin-form h2 { font-size: 1.4rem; margin-top: 0; text-align: center; }
        .admin-form input, .admin-form select { width: 100%; padding: 14px; margin: 8px 0; background: #1a1a2a; border: 1px solid #333; color: white; border-radius: 12px; font-size: 1rem; }

        /* ФУТЕР */
        footer { padding: 40px 20px; text-align: center; background: #0a0a0f; border-top: 1px solid #222; }
        #admin-trigger { position: fixed; bottom: 20px; left: 20px; opacity: 0.2; font-size: 1.8rem; color: white; background: none; border: none; z-index: 1000; }

        #copyToast { visibility: hidden; background: var(--accent-blue); color: white; padding: 15px 30px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); border-radius: 12px; z-index: 5000; font-weight: 900; white-space: nowrap; }
        #copyToast.show { visibility: visible; animation: fadeInUp 0.4s; }
        @keyframes fadeInUp { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 30px; } }

        /* МОДАЛКА */
        .modal-content { background: #1a1a24; margin: 5vh auto; padding: 25px; max-width: 700px; width: 95%; border-radius: 25px; max-height: 90vh; overflow-y: auto; }

        @media (max-width: 480px) {
            .navbar { padding: 10px 15px; }
            .nav-links { gap: 10px; }
            .logo { font-size: 1.1rem; }
            .container { grid-template-columns: 1fr; } /* Одна колонка на очень маленьких экранах */
        }
    </style>
</head>
<body>

    <div id="copyToast">ID Скопировано!</div>
    <div class="bg-wrapper"><div class="grid-overlay"></div><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <nav class="navbar">
        <div class="logo" onclick="window.scrollTo(0,0)">Mysteryx GDPS</div>
        <div class="nav-links">
            <a href="#listSection" id="navDemonList">Demon List</a>
            <button onclick="toggleLang()" id="langBtn" style="background:none; border:1px solid #444; color:white; padding:5px 10px; cursor:pointer; border-radius:5px;">RU</button>
        </div>
    </nav>

    <header class="welcome-hero">
        <h1 id="welcomeTitle">MYSTERYX GDPS</h1>
        <p id="welcomeDesc">Самый амбициозный приватный сервер. Стабильность и уникальный контент.</p>
        <div class="hero-btns">
            <a href="https://t.me/mysteryxgdps" target="_blank" class="btn-main" id="btnPlay">ИГРАТЬ</a>
            <a href="#listSection" class="btn-outline" id="btnList">DEMON LIST</a>
        </div>
    </header>

    <section id="listSection">
        <div class="hero-title">
            <h2 id="txtHero">DEMON LIST</h2>
            <div class="top-50-text" id="top50Banner">TOP 50</div>
        </div>

        <div class="search-box">
            <div class="search-modes">
                <button id="searchModeMain" class="search-mode-btn active" onclick="setSearchMode('main')">Название</button>
                <button id="searchModeTag" class="search-mode-btn" onclick="setSearchMode('tag')">По тегу</button>
            </div>
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск..." oninput="render()">
        </div>

        <div class="mode-tabs">
            <button id="tabDemons" class="tab-btn active" onclick="switchTab('demons')">Demons</button>
            <button id="tabCreators" class="tab-btn" onclick="switchTab('creators')">Creators</button>
        </div>
        
        <div class="container" id="mainContainer"></div>
    </section>

    <footer>
        <div class="footer-socials">
            <a href="https://t.me/mysteryxgdps" target="_blank" style="margin:0 15px; color:white; font-size:1.5rem;"><i class="fab fa-telegram"></i></a>
            <a href="https://www.youtube.com/@lichigmdj98" target="_blank" style="margin:0 15px; color:white; font-size:1.5rem;"><i class="fab fa-youtube"></i></a>
        </div>
        <p style="font-size: 0.8rem; color: #555; margin-top: 15px;">© 2026 Mysteryx GDPS</p>
    </footer>

    <button id="admin-trigger" onclick="openAdmin()"><i class="fas fa-cog"></i></button>

    <div id="adminPanel" class="admin-form">
        <h2>ADMIN PANEL</h2>
        <input type="password" id="adminPass" placeholder="Пароль">
        <select id="admAction" onchange="toggleAdmFields()">
            <option value="add_demon">Добавить Демона</option>
            <option value="add_creator">Добавить Креатора</option>
            <option value="add_victor">Добавить Рекорд</option>
            <option value="delete_mode">Удаление / Движение</option>
        </select>
        
        <div id="fields_main">
            <input type="text" id="itemName" placeholder="Название / Ник">
            <input type="text" id="itemVal" placeholder="Автор / CP">
            <div id="fields_demon">
                <input type="text" id="itemID" placeholder="ID Уровня">
                <input type="text" id="itemTag" placeholder="Тег">
                <input type="text" id="itemVerifier" placeholder="Верифер">
                <input type="text" id="itemImgURL" placeholder="Ссылка на фото">
                <input type="text" id="itemVid" placeholder="YouTube ссылка">
            </div>
        </div>
        <div id="fields_victor" style="display:none;">
            <select id="selectDemon"></select>
            <input type="text" id="vicName" placeholder="Ник игрока">
            <input type="text" id="vicPerc" placeholder="Проценты">
            <input type="text" id="vicAtt" placeholder="Попытки">
        </div>

        <button class="btn-more" onclick="processAdmin()">ВЫПОЛНИТЬ</button>
        <button class="btn-more" style="background:#333; margin-top:10px;" onclick="closeAdmin()">ЗАКРЫТЬ</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-content" id="modalData"></div></div>

    <script>
        // JS КОД ОСТАЕТСЯ БЕЗ ИЗМЕНЕНИЙ, ТАК КАК ОН РАБОЧИЙ. 
        // ТОЛЬКО МИНИМАЛЬНЫЕ ПОПРАВКИ В RENDER ДЛЯ РАЗМЕРОВ.
        const SECRET_HASH = "80f681a9425035255476d0042456345688753239";
        const firebaseConfig = {
            apiKey: "AIzaSyBugYw3fPo4r7Q0e4jDjBUd-JBbCspghE8",
            authDomain: "mysterygdps-30547.firebaseapp.com",
            databaseURL: "https://mysterygdps-30547-default-rtdb.firebaseio.com",
            projectId: "mysterygdps-30547",
            storageBucket: "mysterygdps-30547.firebasestorage.app",
            messagingSenderId: "12553952733",
            appId: "1:12553952733:web:fa603d37c8c08dddefaa34"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentLang = 'RU'; 
        let isDeleteMode = false;
        let searchMode = 'main';
        let demons = []; 
        let creators = [];

        db.ref('demons').on('value', s => { 
            const val = s.val(); 
            demons = val ? Object.entries(val).map(([k, d]) => ({ key: k, ...d })).sort((a,b)=>(a.order||0)-(b.order||0)) : [];
            const sel = document.getElementById('selectDemon');
            if(sel) sel.innerHTML = demons.map(d => `<option value="${d.key}">${d.name}</option>`).join('');
            render(); 
        });
        db.ref('creators').on('value', s => { 
            const val = s.val(); 
            creators = val ? Object.entries(val).map(([k, d]) => ({ key: k, ...d })).sort((a,b)=>parseInt(b.points)-parseInt(a.points)) : [];
            render(); 
        });

        async function hashString(str) {
            const buffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function setSearchMode(m) {
            searchMode = m;
            document.getElementById('searchModeMain').classList.toggle('active', m === 'main');
            document.getElementById('searchModeTag').classList.toggle('active', m === 'tag');
            render();
        }

        function render() {
            const container = document.getElementById('mainContainer');
            const isDem = document.getElementById('tabDemons').classList.contains('active');
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            container.innerHTML = '';
            document.getElementById('txtHero').innerText = isDem ? (currentLang==='EN'?'DEMON LIST':'СПИСОК ДЕМОНОВ') : (currentLang==='EN'?'CREATOR TOP':'ТОП КРЕАТОРОВ');
            document.getElementById('top50Banner').style.display = isDem ? 'block' : 'none';

            if(isDem) {
                const filtered = demons.filter(d => {
                    if (searchMode === 'tag') return d.tag && d.tag.toLowerCase().includes(query);
                    return d.name.toLowerCase().includes(query) || d.author.toLowerCase().includes(query);
                });

                filtered.forEach((d, i) => {
                    container.innerHTML += `
                        <div class="card">
                            ${isDeleteMode ? `
                            <div class="admin-controls">
                                <button class="ctrl-btn btn-up" onclick="moveItem(${i}, -1)"><i class="fas fa-arrow-up"></i></button>
                                <button class="ctrl-btn btn-down" onclick="moveItem(${i}, 1)"><i class="fas fa-arrow-down"></i></button>
                                <button class="ctrl-btn btn-del" onclick="deleteItem('${d.key}','demons')"><i class="fas fa-trash"></i></button>
                            </div>` : ''}
                            ${d.tag ? `<div class="demon-tag">${d.tag}</div>` : ''}
                            <img src="${d.img}" class="card-img" onerror="this.src='https://via.placeholder.com/600x300/111/fff?text=Mysteryx'">
                            <div class="card-body">
                                <h3 style="margin:0; color:var(--accent-blue); font-size: 1.1rem;">#${i+1} ${d.name}</h3>
                                <p style="color:#888; margin: 5px 0 15px; font-size: 0.8rem;">by ${d.author}</p>
                                <div class="level-id-box" onclick="copyID('${d.levelID}')">ID: ${d.levelID}</div>
                                <button class="btn-more" onclick="showInfoByKey('${d.key}')">${currentLang==='EN'?'DETAILS':'ПОДРОБНЕЕ'}</button>
                            </div>
                        </div>`;
                });
            } else {
                const filtered = creators.filter(c => c.name.toLowerCase().includes(query));
                filtered.forEach((c, i) => {
                    container.innerHTML += `<div class="card">
                        ${isDeleteMode ? `<div class="admin-controls"><button class="ctrl-btn btn-del" onclick="deleteItem('${c.key}','creators')"><i class="fas fa-trash"></i></button></div>` : ''}
                        <div class="card-body" style="display:flex; justify-content:space-between; align-items:center; padding:30px;">
                            <h3 style="margin:0; font-size:1.1rem;">#${i+1} ${c.name}</h3>
                            <span style="color:var(--accent-blue); font-weight:900;">${c.points} CP</span>
                        </div>
                    </div>`;
                });
            }
        }

        async function processAdmin() {
            const passField = document.getElementById('adminPass');
            const rawPass = passField.value.trim().toLowerCase();
            const h = await hashString(rawPass);
            if(h === SECRET_HASH || rawPass === "mysteryxgdpsold777") {
                const act = document.getElementById('admAction').value;
                if(act === 'add_demon') {
                    let r = document.getElementById('itemVid').value;
                    let v = r.includes('v=') ? r.split('v=')[1].split('&')[0] : r.includes('youtu.be/') ? r.split('youtu.be/')[1].split('?')[0] : r;
                    db.ref('demons').push({ name: document.getElementById('itemName').value, author: document.getElementById('itemVal').value, levelID: document.getElementById('itemID').value, tag: document.getElementById('itemTag').value, verifier: document.getElementById('itemVerifier').value, img: document.getElementById('itemImgURL').value, vid: v, order: demons.length });
                } else if(act === 'add_creator') {
                    db.ref('creators').push({ name: document.getElementById('itemName').value, points: parseInt(document.getElementById('itemVal').value) || 0 });
                } else if(act === 'add_victor') {
                    const dKey = document.getElementById('selectDemon').value;
                    db.ref(`demons/${dKey}/victors`).push({ name: document.getElementById('vicName').value, perc: document.getElementById('vicPerc').value, att: document.getElementById('vicAtt').value });
                } else if(act === 'delete_mode') { isDeleteMode = !isDeleteMode; render(); }
                closeAdmin();
            } else { alert("Error!"); }
        }

        function toggleLang() {
            currentLang = currentLang === 'RU' ? 'EN' : 'RU';
            document.getElementById('langBtn').innerText = currentLang;
            const t = currentLang === 'RU' ? { play: "ИГРАТЬ", list: "DEMON LIST", searchM: "Название", searchT: "По тегу", searchP: "Поиск...", toast: "ID Скопировано!" } : { play: "PLAY", list: "DEMON LIST", searchM: "Name", searchT: "Tag", searchP: "Search...", toast: "ID Copied!" };
            document.getElementById('btnPlay').innerText = t.play;
            document.getElementById('btnList').innerText = t.list;
            document.getElementById('searchModeMain').innerText = t.searchM;
            document.getElementById('searchModeTag').innerText = t.searchT;
            document.getElementById('searchInput').placeholder = t.searchP;
            document.getElementById('copyToast').innerText = t.toast;
            document.getElementById('navDemonList').innerText = t.list;
            render();
        }

        function showInfoByKey(key) {
            const d = demons.find(x => x.key === key);
            const vics = d.victors ? Object.entries(d.victors).map(([vk, v]) => `<div class="record-item" style="font-size:0.85rem; padding:8px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:8px;"><b>${v.name}</b> — <span style="color:var(--accent-blue)">${v.perc || '100%'}</span></div>`).join('') : "<p>No records</p>";
            document.getElementById('modalData').innerHTML = `
                <h2 style="margin:0;">${d.name}</h2>
                <p style="color:#888;">by ${d.author}</p>
                <iframe style="width:100%; aspect-ratio:16/9; border-radius:15px; margin:15px 0;" src="https://www.youtube.com/embed/${d.vid}" frameborder="0" allowfullscreen></iframe>
                <div style="max-height:200px; overflow-y:auto;">${vics}</div>
                <button class="btn-more" style="background:#222; margin-top:20px;" onclick="document.getElementById('detailModal').style.display='none'">CLOSE</button>`;
            document.getElementById('detailModal').style.display='block';
        }

        function copyID(id) { navigator.clipboard.writeText(id); const t = document.getElementById("copyToast"); t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function moveItem(index, dir) {
            let target = index + dir; if (target < 0 || target >= demons.length) return;
            const updates = {}; updates[`/demons/${demons[index].key}/order`] = target; updates[`/demons/${demons[target].key}/order`] = index;
            db.ref().update(updates);
        }
        function openAdmin() { document.getElementById('adminPanel').style.display='block'; toggleAdmFields(); }
        function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
        function switchTab(t) { document.getElementById('tabDemons').classList.toggle('active', t==='demons'); document.getElementById('tabCreators').classList.toggle('active', t==='creators'); render(); }
        function toggleAdmFields() { 
            const a = document.getElementById('admAction').value; 
            document.getElementById('fields_main').style.display = (a === 'add_demon' || a === 'add_creator') ? 'block' : 'none'; 
            document.getElementById('fields_demon').style.display = a === 'add_demon' ? 'block' : 'none'; 
            document.getElementById('fields_victor').style.display = a === 'add_victor' ? 'block' : 'none'; 
        }
        function deleteItem(k, p) { if(confirm("Del?")) db.ref(p+'/'+k).remove(); }
    </script>
</body>
</html>
