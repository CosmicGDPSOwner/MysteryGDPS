<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysteryx GDPS | Official Global List</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #12121a;
            --card-bg: #1a1a24;
            --main-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 25%, #ff007f 100%);
            --accent-pink: #ff007f;
            --accent-blue: #00d2ff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* ФОН */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: var(--bg); overflow: hidden; }
        .grid-overlay {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 210, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 15s linear infinite;
        }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(60px); } }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 10s ease-in-out infinite; }
        .orb-1 { width: 700px; height: 700px; background: var(--accent-pink); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: var(--accent-blue); bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, 50px); } }

        /* НАВИГАЦИЯ */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(18,18,26,0.95); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-family: 'Montserrat'; font-size: 2.3rem; font-weight: 900; background: var(--main-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; transition: 0.3s; }
        .logo:hover { transform: scale(1.05); filter: brightness(1.2); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .social-link { color: white; font-size: 2rem; transition: 0.3s; opacity: 0.8; text-decoration: none; }
        .social-link:hover { opacity: 1; transform: scale(1.2); color: var(--accent-blue); }
        #langBtn { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); color: white; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 900; transition: 0.3s; }
        #langBtn:hover { background: white; color: black; }

        /* СПИСОК */
        .hero { width: 100%; display: flex; justify-content: center; align-items: center; padding: 60px 20px; text-align: center; }
        .hero h1 { font-family: 'Montserrat'; font-size: clamp(2.5rem, 8vw, 5.5rem); margin: 0; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; padding: 20px; }
        .card { 
            background: var(--card-bg); 
            border-radius: 30px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.08); 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .card:hover { 
            transform: translateY(-15px); 
            border-color: var(--accent-blue); 
            box-shadow: 0 25px 50px rgba(0, 210, 255, 0.3);
        }

        .admin-controls { 
            position: absolute; top: 15px; right: 15px; 
            display: flex; flex-direction: column; gap: 8px; z-index: 100; 
        }
        .btn-edit { 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); 
            color: white; border: 1px solid rgba(255,255,255,0.2); 
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s; 
        }
        .btn-edit:hover { background: var(--accent-blue); transform: scale(1.1); }

        .card-img { width: 100%; height: 215px; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.05); }
        .card-body { padding: 30px; }
        
        .demon-tag { position: absolute; top: 15px; left: 15px; background: var(--main-grad); color: white; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 0.8rem; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        
        .level-id-box { 
            display: flex; align-items: center; gap: 10px; 
            background: rgba(0, 210, 255, 0.08); padding: 12px 18px; 
            border-radius: 15px; font-size: 1rem; color: var(--accent-blue); 
            cursor: pointer; margin-bottom: 20px; border: 1px solid rgba(0,210,255,0.15); 
            width: fit-content; font-weight: 700; transition: 0.3s;
        }
        .level-id-box:hover { background: rgba(0, 210, 255, 0.2); transform: translateX(5px); }

        .btn-more { 
            width: 100%; padding: 18px; background: var(--main-grad); 
            border: none; color: white; border-radius: 15px; 
            cursor: pointer; font-weight: 900; font-size: 1.1rem; 
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-more:hover { filter: brightness(1.2); box-shadow: 0 5px 20px rgba(255, 0, 127, 0.4); }

        /* ТАБЫ */
        .mode-tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; }
        .tab-btn { 
            padding: 18px 45px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: #888; 
            border-radius: 18px; font-weight: 900; font-size: 1.1rem; 
            cursor: pointer; transition: 0.3s; 
        }
        .tab-btn.active { background: white; color: black; box-shadow: 0 10px 25px rgba(255,255,255,0.2); transform: translateY(-3px); }

        /* АДМИНКА */
        .admin-form { 
            display: none; background: #121220; padding: 40px; border-radius: 30px; 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 2000; width: 95%; max-width: 500px; border: 2px solid var(--accent-blue); 
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }
        .admin-form input, .admin-form select { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: #1a1a2a; border: 1px solid #333; color: white; border-radius: 12px; 
        }
        
        #admin-trigger { 
            position: fixed; bottom: 30px; right: 30px; opacity: 0.1; 
            cursor: pointer; font-size: 2.5rem; z-index: 1000; background: none; 
            border: none; color: white; transition: 0.3s; 
        }
        #admin-trigger:hover { opacity: 1; transform: rotate(90deg); color: var(--accent-blue); }

        /* МОДАЛКА И ТОСТ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; backdrop-filter: blur(15px); }
        .modal-content { 
            background: #1a1a24; margin: 5vh auto; padding: 45px; 
            max-width: 800px; width: 92%; border-radius: 35px; border: 1px solid #333; 
            position: relative; box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }
        .victor-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: #12121a; margin-bottom: 10px; 
            border-radius: 15px; border-left: 5px solid var(--accent-pink); 
            transition: 0.3s;
        }
        .del-victor { color: #ff3333; cursor: pointer; margin-left: 15px; font-size: 1.3rem; }
        
        #copyToast { 
            visibility: hidden; background: var(--accent-blue); color: white; 
            padding: 20px 40px; position: fixed; left: 50%; bottom: 40px; 
            transform: translateX(-50%); border-radius: 15px; z-index: 5000; font-weight: 900; 
        }
        #copyToast.show { visibility: visible; animation: fadeInUp 0.4s; }
        @keyframes fadeInUp { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 40px; } }
    </style>
</head>
<body>

    <div id="copyToast">ID Скопировано!</div>
    <div class="bg-wrapper"><div class="grid-overlay"></div><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <nav class="navbar">
        <div class="logo" onclick="location.reload()">Mysteryx GDPS</div>
        <div class="nav-right">
            <a href="https://t.me/mysteryxgdps" target="_blank" class="social-link"><i class="fab fa-telegram"></i></a>
            <a href="https://www.youtube.com/@lichigmdj98" target="_blank" class="social-link"><i class="fab fa-youtube"></i></a>
            <button onclick="toggleLang()" id="langBtn">РУС</button>
        </div>
    </nav>

    <section id="listSection">
        <div class="hero"><h1 id="txtHero">DEMON LIST</h1></div>
        <div class="mode-tabs">
            <button id="tabDemons" class="tab-btn active" onclick="switchTab('demons')">Demons</button>
            <button id="tabCreators" class="tab-btn" onclick="switchTab('creators')">Creators</button>
        </div>
        <div class="container" id="mainContainer"></div>
    </section>

    <button id="admin-trigger" onclick="openAdmin()"><i class="fas fa-shield-alt"></i></button>

    <div id="adminPanel" class="admin-form">
        <h2 style="text-align:center; font-family: Montserrat; letter-spacing: 2px;">ADMIN PANEL</h2>
        <input type="password" id="adminPass" placeholder="Пароль">
        <select id="admAction" onchange="toggleAdmFields()">
            <option value="add_demon">Добавить Демона</option>
            <option value="add_creator">Добавить Креатора</option>
            <option value="add_victor">Добавить Рекорд</option>
            <option value="delete_mode">Удаление / Движение</option>
        </select>
        
        <div id="fields_main">
            <input type="text" id="itemName" placeholder="Название / Ник">
            <input type="text" id="itemVal" placeholder="Автор / CP">
            <div id="fields_demon">
                <input type="text" id="itemID" placeholder="ID Уровня">
                <input type="text" id="itemTag" placeholder="Тег (напр. Top 1)">
                <input type="text" id="itemImgURL" placeholder="Ссылка на картинку">
                <input type="text" id="itemVid" placeholder="Ссылка на YouTube">
            </div>
        </div>
        <div id="fields_victor" style="display:none;">
            <select id="selectDemon"></select>
            <input type="text" id="vicName" placeholder="Ник игрока">
            <input type="text" id="vicPerc" placeholder="Проценты (напр. 100%)">
            <input type="text" id="vicAtt" placeholder="Попытки">
        </div>

        <button class="btn-more" onclick="processAdmin()">ВЫПОЛНИТЬ</button>
        <button class="btn-more" style="background:#222; margin-top:10px;" onclick="closeAdmin()">ЗАКРЫТЬ</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-content" id="modalData"></div></div>

    <script>
        // Глобальные настройки
        const SECRET_HASH = "80f681a9425035255476d0042456345688753239"; // mysteryxgdpsold777

        const firebaseConfig = {
            apiKey: "AIzaSyBugYw3fPo4r7Q0e4jDjBUd-JBbCspghE8",
            authDomain: "mysterygdps-30547.firebaseapp.com",
            databaseURL: "https://mysterygdps-30547-default-rtdb.firebaseio.com",
            projectId: "mysterygdps-30547",
            storageBucket: "mysterygdps-30547.firebasestorage.app",
            messagingSenderId: "12553952733",
            appId: "1:12553952733:web:fa603d37c8c08dddefaa34"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentLang = 'EN'; 
        let isDeleteMode = false;
        let demons = []; 
        let creators = [];

        // Получение данных
        db.ref('demons').on('value', s => { 
            const val = s.val(); 
            demons = val ? Object.entries(val).map(([k, d]) => ({ key: k, ...d })).sort((a,b)=>(a.order||0)-(b.order||0)) : [];
            const sel = document.getElementById('selectDemon');
            if(sel) sel.innerHTML = demons.map(d => `<option value="${d.key}">${d.name}</option>`).join('');
            render(); 
        });
        db.ref('creators').on('value', s => { 
            const val = s.val(); 
            creators = val ? Object.entries(val).map(([k, d]) => ({ key: k, ...d })).sort((a,b)=>parseInt(b.points)-parseInt(a.points)) : [];
            render(); 
        });

        // Функция хеширования
        async function hashString(str) {
            const buffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function render() {
            const container = document.getElementById('mainContainer');
            const isDem = document.getElementById('tabDemons').classList.contains('active');
            container.innerHTML = '';
            document.getElementById('txtHero').innerText = isDem ? (currentLang==='EN'?'DEMON LIST':'СПИСОК ДЕМОНОВ') : (currentLang==='EN'?'CREATOR TOP':'ТОП КРЕАТОРОВ');

            if(isDem) {
                demons.forEach((d, i) => {
                    container.innerHTML += `
                        <div class="card">
                            ${isDeleteMode ? `<div class="admin-controls">
                                <button class="btn-edit" onclick="moveItem(${i}, -1)"><i class="fas fa-chevron-up"></i></button>
                                <button class="btn-edit" onclick="moveItem(${i}, 1)"><i class="fas fa-chevron-down"></i></button>
                                <button class="btn-edit" style="background:red;" onclick="deleteItem('${d.key}','demons')"><i class="fas fa-trash"></i></button>
                            </div>` : ''}
                            ${d.tag ? `<div class="demon-tag">${d.tag}</div>` : ''}
                            <img src="${d.img}" class="card-img" onerror="this.src='https://via.placeholder.com/600x300/111/fff?text=Mysteryx'">
                            <div class="card-body">
                                <h3 style="background:var(--main-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent; font-size:1.7rem; margin:0;">#${i+1} ${d.name}</h3>
                                <p style="color:#888; margin: 5px 0 15px;">by ${d.author}</p>
                                ${d.levelID ? `<div class="level-id-box" onclick="copyID('${d.levelID}')"><i class="far fa-copy"></i> ID: ${d.levelID}</div>` : ''}
                                <button class="btn-more" onclick="showInfo(${i})">${currentLang==='EN'?'DETAILS':'ПОДРОБНЕЕ'}</button>
                            </div>
                        </div>`;
                });
            } else {
                creators.forEach((c, i) => {
                    container.innerHTML += `
                        <div class="card">
                            ${isDeleteMode ? `<div class="admin-controls"><button class="btn-edit" style="background:red;" onclick="deleteItem('${c.key}','creators')"><i class="fas fa-trash"></i></button></div>` : ''}
                            <div class="card-body" style="display:flex; justify-content:space-between; align-items:center; padding:40px;">
                                <h3 style="font-size:1.8rem; margin:0;">#${i+1} ${c.name}</h3>
                                <div style="text-align:right;"><span style="font-size:2.5rem; font-weight:900; color:var(--accent-blue);">${c.points}</span><div style="font-weight:900; color:#888;">CP</div></div>
                            </div>
                        </div>`;
                });
            }
        }

        async function processAdmin() {
            const rawPass = document.getElementById('adminPass').value.trim().toLowerCase();
            const h = await hashString(rawPass);
            
            if(h !== SECRET_HASH) {
                console.log("Input hash:", h);
                return alert("Wrong Password!");
            }

            const act = document.getElementById('admAction').value;
            if(act === 'add_demon') {
                let r = document.getElementById('itemVid').value;
                let v = r.includes('v=') ? r.split('v=')[1].split('&')[0] : r.includes('youtu.be/') ? r.split('youtu.be/')[1].split('?')[0] : r;
                db.ref('demons').push({ 
                    name: document.getElementById('itemName').value, 
                    author: document.getElementById('itemVal').value, 
                    levelID: document.getElementById('itemID').value, 
                    tag: document.getElementById('itemTag').value, 
                    img: document.getElementById('itemImgURL').value, 
                    vid: v, 
                    order: demons.length 
                });
            } else if(act === 'add_creator') {
                db.ref('creators').push({ 
                    name: document.getElementById('itemName').value, 
                    points: parseInt(document.getElementById('itemVal').value) || 0 
                });
            } else if(act === 'add_victor') {
                const dKey = document.getElementById('selectDemon').value;
                db.ref(`demons/${dKey}/victors`).push({ 
                    name: document.getElementById('vicName').value, 
                    perc: document.getElementById('vicPerc').value, 
                    att: document.getElementById('vicAtt').value 
                });
            } else if(act === 'delete_mode') {
                isDeleteMode = !isDeleteMode;
                render();
            }
            closeAdmin();
            document.getElementById('adminPass').value = '';
        }

        function showInfo(i) {
            const d = demons[i];
            const vics = d.victors ? Object.entries(d.victors).map(([vk, v]) => `
                <div class="victor-item">
                    <span><b>${v.name}</b> — <span style="color:var(--accent-blue)">${v.perc || '100%'}</span> (${v.att} att)</span>
                    ${isDeleteMode ? `<i class="fas fa-times del-victor" title="Удалить" onclick="deleteVictor('${d.key}', '${vk}')"></i>` : ''}
                </div>`).join('') : "No records yet";

            document.getElementById('modalData').innerHTML = `
                <h2 style="font-family:Montserrat; font-size:2rem; margin:0;">${d.name}</h2>
                <iframe style="width:100%; aspect-ratio:16/9; border-radius:20px; margin:25px 0; border:1px solid #333;" src="https://www.youtube.com/embed/${d.vid}" frameborder="0" allowfullscreen></iframe>
                <h3 style="margin-bottom:15px;">Records:</h3>
                <div style="max-height:250px; overflow-y:auto; padding-right:10px;">${vics}</div>
                <button class="btn-more" style="background:#222; margin-top:30px;" onclick="document.getElementById('detailModal').style.display='none'">CLOSE</button>`;
            document.getElementById('detailModal').style.display='block';
        }

        function deleteVictor(demonKey, victorKey) {
            if(confirm("Удалить этот рекорд?")) {
                db.ref(`demons/${demonKey}/victors/${victorKey}`).remove().then(() => {
                    document.getElementById('detailModal').style.display='none';
                });
            }
        }

        function moveItem(index, dir) {
            let target = index + dir;
            if (target < 0 || target >= demons.length) return;
            const updates = {};
            updates[`/demons/${demons[index].key}/order`] = target;
            updates[`/demons/${demons[target].key}/order`] = index;
            db.ref().update(updates);
        }

        function copyID(id) {
            navigator.clipboard.writeText(id);
            const t = document.getElementById("copyToast"); t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        function toggleAdmFields() {
            const a = document.getElementById('admAction').value;
            document.getElementById('fields_main').style.display = (a === 'add_demon' || a === 'add_creator') ? 'block' : 'none';
            document.getElementById('fields_demon').style.display = a === 'add_demon' ? 'block' : 'none';
            document.getElementById('fields_victor').style.display = a === 'add_victor' ? 'block' : 'none';
        }

        function toggleLang() {
            currentLang = currentLang === 'EN' ? 'RU' : 'EN';
            document.getElementById('langBtn').innerText = currentLang === 'EN' ? 'РУС' : 'ENG';
            render();
        }

        function deleteItem(k, p) { if(confirm("Удалить?")) db.ref(p+'/'+k).remove(); }
        function switchTab(t) { document.getElementById('tabDemons').classList.toggle('active', t==='demons'); document.getElementById('tabCreators').classList.toggle('active', t==='creators'); render(); }
        function openAdmin() { document.getElementById('adminPanel').style.display='block'; toggleAdmFields(); }
        function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
    </script>
</body>
</html>
