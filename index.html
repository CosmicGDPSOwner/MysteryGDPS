<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysteryx GDPS | Official Global List</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #030308;
            --main-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 25%, #ff007f 100%);
            --accent-pink: #ff007f;
            --accent-blue: #00d2ff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- ВОЗВРАЩЕННЫЕ ЦВЕТА И ФОН --- */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #030308; overflow: hidden; }
        .grid-overlay {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.08) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 210, 255, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 15s linear infinite;
        }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(60px); } }

        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.25; animation: orbit 20s infinite alternate; }
        .orb-1 { width: 600px; height: 600px; background: var(--accent-pink); top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: var(--accent-blue); bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes orbit { from { transform: translate(0, 0) scale(1); } to { transform: translate(100px, 50px) scale(1.2); } }

        /* НАВИГАЦИЯ */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-family: 'Montserrat'; font-size: 2.3rem; font-weight: 900; background: var(--main-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(0,210,255,0.4)); }
        
        .social-link { color: white; font-size: 1.8rem; margin-left: 20px; transition: 0.3s; }
        .social-link:hover { color: var(--accent-pink); transform: scale(1.2); }

        #langBtn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 900; margin-left: 15px; }

        .hero { text-align: center; padding: 80px 20px 40px; }
        .hero h1 { font-family: 'Montserrat'; font-size: clamp(3rem, 10vw, 6rem); margin: 0; text-transform: uppercase; letter-spacing: -3px; }

        .mode-tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; }
        .tab-btn { padding: 18px 40px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; border-radius: 20px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.4s; }
        .tab-btn.active { background: white; color: black; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }

        /* КАРТОЧКИ */
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 40px; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.04); border-radius: 35px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); position: relative; backdrop-filter: blur(15px); transition: 0.4s; animation: fadeInUp 0.6s ease backwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-img { width: 100%; height: 210px; object-fit: cover; }
        .card-body { padding: 30px; }
        .btn-more { width: 100%; padding: 16px; background: var(--main-grad); border: none; color: white; border-radius: 15px; cursor: pointer; font-weight: 900; font-size: 1rem; text-transform: uppercase; margin-top: 15px; }
        
        /* КНОПКИ УДАЛЕНИЯ И СМЕЩЕНИЯ */
        .btn-delete { position: absolute; top: 20px; right: 20px; background: #ff3333; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 900; z-index: 100; box-shadow: 0 5px 15px rgba(255,51,51,0.4); }
        .reorder-controls { position: absolute; top: 75px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .move-btn { background: rgba(0,0,0,0.8); color: white; border: 2px solid var(--accent-blue); padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 1.2rem; }

        /* АДМИНКА */
        .admin-form { display: none; background: #0a0a12; padding: 40px; border-radius: 35px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 95%; max-width: 480px; border: 2px solid var(--accent-blue); }
        .admin-form input, .admin-form select { width: 100%; padding: 15px; margin: 12px 0; background: #151525; border: 1px solid #333; color: white; border-radius: 15px; font-size: 1rem; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 3000; backdrop-filter: blur(20px); }
        .modal-content { background: #0d0d15; margin: 5vh auto; padding: 40px; max-width: 800px; width: 92%; border-radius: 40px; border: 1px solid #333; position: relative; }

        #admin-trigger { position: fixed; bottom: 30px; right: 30px; opacity: 0.1; color: white; background: none; border: none; cursor: pointer; font-size: 2rem; z-index: 1000; }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="grid-overlay"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav class="navbar">
        <div class="logo">Mysteryx GDPS</div>
        <div style="display:flex; align-items:center;">
            <a href="https://t.me/mysteryxgdps" target="_blank" class="social-link"><i class="fab fa-telegram"></i></a>
            <a href="https://www.youtube.com/@lichigmdj98" target="_blank" class="social-link"><i class="fab fa-youtube"></i></a>
            <button onclick="toggleLang()" id="langBtn">РУС</button>
        </div>
    </nav>

    <div class="hero"><h1 id="txtHero">DEMON LIST</h1></div>

    <div class="mode-tabs">
        <button id="tabDemons" class="tab-btn active" onclick="switchTab('demons')">Demons</button>
        <button id="tabCreators" class="tab-btn" onclick="switchTab('creators')">Creators</button>
    </div>

    <div class="container" id="mainContainer"></div>

    <button id="admin-trigger" onclick="openAdmin()"><i class="fas fa-shield-alt"></i></button>

    <div id="adminPanel" class="admin-form">
        <h2 style="text-align:center;">ADMIN PANEL</h2>
        <input type="password" id="adminPass" placeholder="Пароль">
        <select id="admAction" onchange="toggleAdmFields()">
            <option value="add_demon">Добавить Демона</option>
            <option value="add_creator">Добавить Креатора</option>
            <option value="add_victor">Добавить Победителя</option>
            <option value="reorder">Изменить порядок (Демоны)</option>
            <option value="delete_mode">Режим удаления</option>
        </select>

        <div id="fields_main">
            <input type="text" id="itemName" placeholder="Название/Ник">
            <input type="text" id="itemVal" placeholder="Автор/CP">
            <div id="fields_only_demon">
                <input type="text" id="itemTag" placeholder="Тег (Top 1)">
                <input type="text" id="itemImgURL" placeholder="URL картинки">
                <input type="text" id="itemVid" placeholder="YouTube Video ID">
            </div>
        </div>

        <div id="fields_victor" style="display:none;">
            <select id="selectDemon"></select>
            <input type="text" id="vicName" placeholder="Игрок">
            <input type="text" id="vicAtt" placeholder="Попытки">
            <input type="text" id="vicPerc" placeholder="Процент">
        </div>

        <button class="btn-more" onclick="processAdmin()">ПРИМЕНИТЬ</button>
        <button class="btn-more" style="background:#111; margin-top:15px;" onclick="closeAdmin()">ЗАКРЫТЬ</button>
    </div>

    <div id="detailModal" class="modal"><div class="modal-content" id="modalData"></div></div>

    <script>
        const SECRET_HASH = "40bd001563085fc35165329ea1ff5c5ecbdbbeef"; 
        async function hashString(str) {
            const buffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBugYw3fPo4r7Q0e4jDjBUd-JBbCspghE8",
            authDomain: "mysterygdps-30547.firebaseapp.com",
            databaseURL: "https://mysterygdps-30547-default-rtdb.firebaseio.com",
            projectId: "mysterygdps-30547",
            storageBucket: "mysterygdps-30547.firebasestorage.app",
            messagingSenderId: "12553952733",
            appId: "1:12553952733:web:fa603d37c8c08dddefaa34"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentLang = 'EN';
        let isDeleteMode = false;
        let isReorderMode = false;
        let demons = []; let creators = [];

        const dict = {
            EN: { hero: "DEMON LIST", hero_c: "CREATOR TOP", vics: "Victors", del: "DELETE" },
            RU: { hero: "СПИСОК ДЕМОНОВ", hero_c: "ТОП КРЕАТОРОВ", vics: "Победители", del: "УДАЛИТЬ" }
        };

        db.ref('demons').on('value', s => { 
            const val = s.val(); 
            demons = val ? Object.entries(val).map(([key, data]) => ({ key, ...data })).sort((a,b)=>(a.order||0)-(b.order||0)) : [];
            render(); 
        });

        db.ref('creators').on('value', s => { 
            const val = s.val(); 
            creators = val ? Object.entries(val).map(([key, data]) => ({ key, ...data })).sort((a,b)=>parseInt(b.points)-parseInt(a.points)) : [];
            render(); 
        });

        function render() {
            const container = document.getElementById('mainContainer');
            const isDem = document.getElementById('tabDemons').classList.contains('active');
            document.getElementById('txtHero').innerText = isDem ? dict[currentLang].hero : dict[currentLang].hero_c;
            
            container.innerHTML = '';
            if(isDem) {
                demons.forEach((d, i) => {
                    container.innerHTML += `
                        <div class="card" style="animation-delay:${i*0.05}s">
                            ${isDeleteMode ? `<button class="btn-delete" onclick="deleteItem('${d.key}','demons')">${dict[currentLang].del}</button>` : ''}
                            ${isReorderMode ? `<div class="reorder-controls"><button class="move-btn" onclick="moveItem(${i},-1)">↑</button><button class="move-btn" onclick="moveItem(${i},1)">↓</button></div>` : ''}
                            <img src="${d.img}" onerror="this.src='https://via.placeholder.com/1280x720/111/fff?text=Broken+Link'" class="card-img">
                            <div class="card-body">
                                <h3 style="background:var(--main-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">#${i+1} ${d.name}</h3>
                                <p style="color:#555;">by ${d.author}</p>
                                <button class="btn-more" onclick="showInfo(${i})">DETAILS</button>
                            </div>
                        </div>`;
                });
            } else {
                creators.forEach((c, i) => {
                    container.innerHTML += `
                        <div class="card" style="animation-delay:${i*0.05}s">
                            ${isDeleteMode ? `<button class="btn-delete" onclick="deleteItem('${c.key}','creators')">${dict[currentLang].del}</button>` : ''}
                            <div class="card-body" style="display:flex; justify-content:space-between; align-items:center;">
                                <h3 style="margin:0;">#${i+1} ${c.name}</h3>
                                <div style="text-align:right;"><span style="font-size:1.8rem; font-weight:900; color:var(--accent-blue);">${c.points}</span><div style="font-size:0.7rem; color:#444;">CP</div></div>
                            </div>
                        </div>`;
                });
            }
        }

        async function processAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(await hashString(pass) !== SECRET_HASH) return alert("Wrong Code");
            const act = document.getElementById('admAction').value;
            
            if(act === 'add_demon') {
                db.ref('demons').push({ name: document.getElementById('itemName').value, author: document.getElementById('itemVal').value, tag: document.getElementById('itemTag').value, img: document.getElementById('itemImgURL').value, vid: document.getElementById('itemVid').value, order: demons.length });
            } else if(act === 'add_creator') {
                db.ref('creators').push({ name: document.getElementById('itemName').value, points: parseInt(document.getElementById('itemVal').value) || 0 });
            } else if(act === 'add_victor') {
                const d = demons[document.getElementById('selectDemon').value];
                const vics = d.victors || [];
                vics.push({ name: document.getElementById('vicName').value, att: document.getElementById('vicAtt').value, perc: document.getElementById('vicPerc').value });
                db.ref('demons/'+d.key).update({ victors: vics });
            } else if(act === 'delete_mode') { isDeleteMode = !isDeleteMode; isReorderMode = false; }
            else if(act === 'reorder') { isReorderMode = !isReorderMode; isDeleteMode = false; }
            closeAdmin();
        }

        function deleteItem(key, path) { if(confirm("Удалить?")) db.ref(path + '/' + key).remove(); }

        function showInfo(i) {
            const d = demons[i];
            const vH = d.victors ? d.victors.map(v => `<div style="padding:12px; background:#111; margin-bottom:8px; border-radius:12px; border-left:4px solid var(--accent-pink);"><b>${v.name}</b>: ${v.perc} (${v.att})</div>`).join('') : "No victors.";
            document.getElementById('modalData').innerHTML = `<h3>${d.name}</h3><div style="position:relative; padding-bottom:56.25%; height:0; margin:15px 0;"><iframe style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:15px;" src="https://www.youtube.com/embed/${d.vid}" frameborder="0" allowfullscreen></iframe></div><h4>${dict[currentLang].vics}:</h4><div style="max-height:180px; overflow-y:auto;">${vH}</div><button class="btn-more" style="background:#222;" onclick="document.getElementById('detailModal').style.display='none'">CLOSE</button>`;
            document.getElementById('detailModal').style.display='block';
        }

        function toggleAdmFields() {
            const act = document.getElementById('admAction').value;
            document.getElementById('fields_main').style.display = (act === 'add_demon' || act === 'add_creator') ? 'block' : 'none';
            document.getElementById('fields_only_demon').style.display = (act === 'add_demon') ? 'block' : 'none';
            document.getElementById('fields_victor').style.display = (act === 'add_victor') ? 'block' : 'none';
            if(act === 'add_victor') document.getElementById('selectDemon').innerHTML = demons.map((d,i)=>`<option value="${i}">${d.name}</option>`).join('');
        }

        function moveItem(index, dir) {
            let next = index + dir; if(next < 0 || next >= demons.length) return;
            db.ref('demons/'+demons[index].key).update({ order: next });
            db.ref('demons/'+demons[next].key).update({ order: index });
        }
        function toggleLang() { currentLang = currentLang === 'EN' ? 'RU' : 'EN'; document.getElementById('langBtn').innerText = currentLang==='EN'?'РУС':'ENG'; render(); }
        function switchTab(t) { document.getElementById('tabDemons').classList.toggle('active', t==='demons'); document.getElementById('tabCreators').classList.toggle('active', t==='creators'); render(); }
        function openAdmin() { document.getElementById('adminPanel').style.display='block'; toggleAdmFields(); }
        function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
    </script>
</body>
</html>
